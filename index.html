<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radiator Heat Calculator</title>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>Radiator Heat Calculator</h1>
        <p class="tagline">
          Estimate the heat output your room needs so you can size radiators
          with confidence — enter the room dimensions and details to see the
          required output in watts and BTU/hr.
        </p>
      </header>

      <main class="layout">
        <div id="form-root"></div>
        <div id="results-root"></div>
      </main>

      <footer class="app-footer">
        <p>Estimates only — always confirm sizing with a heating professional.</p>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
